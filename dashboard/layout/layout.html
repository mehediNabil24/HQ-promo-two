<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — HQ Promo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/style.css" />
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  </head>
  <body class="dash-page">
    <div class="dash-shell d-flex">
      <!-- Sidebar -->
      <aside
        class="dash-sidebar flex-shrink-0"
        aria-label="Dashboard navigation"
      >
        <a
          class="dash-sidebar__logo d-inline-flex"
          href="../../index.html"
          aria-label="HQ Promo home"
        >
          <img
            src="../../assets/images/logo.png"
            alt="HQ Promo"
            width="64"
            height="64"
          />
        </a>

        <div class="dash-profile gradient-border card border-0 w-100">
          <div
            class="card-body d-flex flex-column align-items-center text-center gap-2"
          >
            <div class="dash-profile__avatar">
              <img
                src="../../assets/dashboard/profile-pic.jpg"
                alt="Customer profile"
                width="76"
                height="70"
              />
            </div>
            <p class="dash-profile__name mb-0">[Customer Name]</p>
            <div
              class="dash-profile__balance d-flex align-items-stretch gap-1 w-100 justify-content-center"
            >
              <span class="dash-profile__amount">$400.99</span>
              <button
                class="dash-profile__add gradient-border btn p-0"
                type="button"
                aria-label="Add funds"
              >
                <iconify-icon
                  icon="ic:baseline-plus"
                  width="18"
                  height="18"
                ></iconify-icon>
              </button>
            </div>
          </div>
        </div>

        <nav class="dash-nav w-100" aria-label="Order and services">
          <div class="dash-nav__section">
            <button
              class="dash-nav__heading"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navOrderServices"
              aria-expanded="true"
              aria-controls="navOrderServices"
            >
              <span>ORDER &amp; SERVICES</span>
              <iconify-icon
                class="dash-nav__chevron"
                icon="mdi:menu-up"
                width="20"
                height="20"
              ></iconify-icon>
            </button>
            <div class="collapse show" id="navOrderServices">
              <ul class="dash-nav__list list-unstyled mb-0">
                <li>
                  <a class="dash-nav__link is-active" href="../pages/neworder/neworder.html">
                    <iconify-icon
                      icon="mdi:cart-outline"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>New Order</span>
                  </a>
                </li>
                <li>
                  <a class="dash-nav__link" href="#">
                    <iconify-icon
                      icon="solar:card-linear"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>Add Funds</span>
                  </a>
                </li>
                <li>
                  <a class="dash-nav__link" href="#">
                    <iconify-icon
                      icon="solar:box-linear"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>My Orders</span>
                  </a>
                </li>
                <li>
                  <a class="dash-nav__link" href="#">
                    <iconify-icon
                      icon="solar:clipboard-linear"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>Mass Order</span>
                  </a>
                </li>
                <li>
                  <a class="dash-nav__link" href="#">
                    <iconify-icon
                      icon="mdi:cog-outline"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>Services</span>
                  </a>
                </li>
                <li>
                  <a class="dash-nav__link" href="#">
                    <iconify-icon
                      icon="solar:headphones-round-linear"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>My Tickets</span>
                  </a>
                </li>
              </ul>
            </div>
          </div>

          <div class="dash-nav__section">
            <button
              class="dash-nav__heading"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navQuickLink"
              aria-expanded="true"
              aria-controls="navQuickLink"
            >
              <span>QUICK LINK</span>
              <iconify-icon
                class="dash-nav__chevron"
                icon="mdi:menu-up"
                width="20"
                height="20"
              ></iconify-icon>
            </button>
            <div class="collapse show" id="navQuickLink">
              <ul class="dash-nav__list list-unstyled mb-0">
                <li>
                  <a class="dash-nav__link" href="#">
                    <iconify-icon
                      icon="solar:code-linear"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>Drip Feed</span>
                  </a>
                </li>
                <li>
                  <a class="dash-nav__link" href="../pages/refunds.html">
                    <iconify-icon
                      icon="solar:undo-left-round-linear"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>Refunds</span>
                  </a>
                </li>
                <li>
                  <a class="dash-nav__link" href="#">
                    <iconify-icon
                      icon="solar:add-square-linear"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>Refill</span>
                  </a>
                </li>
                <li>
                  <a class="dash-nav__link" href="#">
                    <iconify-icon
                      icon="ph:arrows-left-right"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>Subscriptions</span>
                  </a>
                </li>
              </ul>
            </div>
          </div>

          <div class="dash-nav__section">
            <button
              class="dash-nav__heading"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navApiUpdates"
              aria-expanded="true"
              aria-controls="navApiUpdates"
            >
              <span>API &amp; UPDATES</span>
              <iconify-icon
                class="dash-nav__chevron"
                icon="mdi:menu-up"
                width="20"
                height="20"
              ></iconify-icon>
            </button>
            <div class="collapse show" id="navApiUpdates">
              <ul class="dash-nav__list list-unstyled mb-0">
                <li>
                  <a class="dash-nav__link" href="#">
                    <iconify-icon
                      icon="solar:code-linear"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>API</span>
                  </a>
                </li>
                <li>
                  <a class="dash-nav__link" href="../pages/updates.html">
                    <iconify-icon
                      icon="solar:refresh-linear"
                      width="24"
                      height="24"
                    ></iconify-icon>
                    <span>Updates</span>
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </aside>

      <button
        class="dash-sidebar-edge-toggle d-none d-lg-inline-flex"
        type="button"
        data-dash-sidebar-edge-toggle
        aria-label="Toggle sidebar"
        aria-expanded="true"
      >
        <img src="../../assets/dashboard/sidebar-toggle.svg" alt="" width="16" height="16" aria-hidden="true" />
      </button>

      <!-- Main -->
      <div class="dash-content flex-grow-1 min-w-0 d-flex flex-column">
        <header
          class="dash-header d-flex align-items-center justify-content-between"
        >
          <div class="d-flex align-items-center gap-3">
            <button
              class="dash-sidebar-toggle btn d-lg-none p-0"
              type="button"
              data-dash-sidebar-toggle
              aria-label="Toggle sidebar"
            >
              <iconify-icon
                icon="mdi:menu"
                width="24"
                height="24"
              ></iconify-icon>
            </button>
            <div class="dash-header__title d-flex align-items-center gap-2">
              <!-- Page title slot -->
              <iconify-icon
                class="dash-header__title-icon"
                icon="mdi:view-dashboard-outline"
                width="24"
                height="24"
              ></iconify-icon>
              <span>Dashboard</span>
            </div>
          </div>

          <div class="dash-header__actions d-flex align-items-center gap-2">
            <div class="dropdown">
              <button
                class="dash-wallet btn"
                type="button"
                id="dashCurrencyMenu"
                data-bs-toggle="dropdown"
                data-bs-display="static"
                data-bs-auto-close="true"
                aria-expanded="false"
                aria-label="Currency"
              >
                <span class="dash-wallet__icon" aria-hidden="true">
                  <iconify-icon
                    icon="mdi:wallet"
                    width="14"
                    height="14"
                  ></iconify-icon>
                </span>
                <span class="dash-wallet__amount" data-dash-currency-amount
                  >$0.00</span
                >
                <iconify-icon
                  icon="mdi:chevron-down"
                  width="18"
                  height="18"
                ></iconify-icon>
              </button>
              <ul
                class="dash-profile-menu dropdown-menu dropdown-menu-end"
                aria-labelledby="dashCurrencyMenu"
              >
                <li>
                  <button
                    class="dash-profile-menu__link is-accent"
                    type="button"
                    data-dash-currency="USD"
                    data-dash-currency-symbol="$"
                  >
                    USD
                  </button>
                </li>
                <li>
                  <button
                    class="dash-profile-menu__link"
                    type="button"
                    data-dash-currency="EUR"
                    data-dash-currency-symbol="€"
                  >
                    EUR
                  </button>
                </li>
              </ul>
            </div>

            <button
              class="theme-toggle"
              type="button"
              data-theme-toggle
              aria-pressed="false"
              aria-label="Switch to dark theme"
            >
              <span class="theme-toggle__track" aria-hidden="true"></span>
              <span class="theme-toggle__label" data-theme-label>Light</span>
              <span class="theme-toggle__thumb" aria-hidden="true">
                <img
                  class="theme-toggle__icon theme-toggle__icon--light"
                  src="../../assets/icons/theme-thumb.svg"
                  alt=""
                  width="32"
                  height="32"
                />
                                <span
                  class="theme-toggle__icon theme-toggle__icon--dark"
                  aria-hidden="true"
                >
                  <iconify-icon
                    icon="ph:moon-fill"
                    width="20" height="20"
                  ></iconify-icon>
                </span>
              </span>
            </button>

            <button
              class="dash-notify btn"
              type="button"
              aria-label="Notifications"
            >
              <img
                class="dash-notify__icon"
                src="../../assets/dashboard/notification-icon.png"
                alt=""
                width="24"
                height="24"
              />
              <span class="dash-notify__dot" aria-hidden="true"></span>
            </button>

            <div class="dropdown">
              <button
                class="dash-user btn"
                type="button"
                id="dashProfileMenu"
                data-bs-toggle="dropdown"
                data-bs-display="static"
                data-bs-auto-close="true"
                aria-expanded="false"
                aria-label="Account menu"
              >
                <img
                  class="dash-user__avatar rounded-circle"
                  src="../../assets/dashboard/profile-pic.jpg"
                  alt=""
                  width="30"
                  height="30"
                />
                <iconify-icon
                  icon="mdi:chevron-down"
                  width="18"
                  height="18"
                ></iconify-icon>
              </button>
              <ul
                class="dash-profile-menu dropdown-menu dropdown-menu-end"
                aria-labelledby="dashProfileMenu"
              >
                <li>
                  <a class="dash-profile-menu__link is-accent" href="#"
                    >My Account</a
                  >
                </li>
                <li>
                  <a class="dash-profile-menu__link" href="#">Dashboard</a>
                </li>
                <li>
                  <a class="dash-profile-menu__link" href="#">API</a>
                </li>
                <li>
                  <a class="dash-profile-menu__link is-logout" href="#">
                    <iconify-icon
                      icon="heroicons-outline:logout"
                      width="20"
                      height="20"
                    ></iconify-icon>
                    <span>Log Out</span>
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </header>

        <main class="dash-main flex-grow-1">
          <!-- Page content slot: insert each dashboard page body here -->
        </main>
      </div>
    </div>

    <div class="dash-sidebar-backdrop" data-dash-sidebar-backdrop hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/main.js"></script>
  </body>
</html>
